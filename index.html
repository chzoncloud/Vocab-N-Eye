<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>N'Eye Vocab ✦</title>
<link href="https://fonts.googleapis.com/css2?family=Mali:wght@500;600;700&family=Prompt:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#FBF8EE; --grid:#E4DECB; --ink:#2E2440;
  --purple:#7B5EA7; --purple-dark:#5A4380;
  --pink:#F2A7C3; --pink-soft:#FBE3ED;
  --green:#7FBF8E; --red:#E58787; --gold:#F5C84C;
  --shadow:0 4px 0 rgba(46,36,64,.15);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{
  font-family:'Prompt',sans-serif;background:var(--paper);
  background-image:linear-gradient(var(--grid) 1px,transparent 1px),linear-gradient(90deg,var(--grid) 1px,transparent 1px);
  background-size:22px 22px;color:var(--ink);min-height:100vh;
  display:flex;flex-direction:column;align-items:center;padding:16px 14px 40px;
}
h1{font-family:'Mali',cursive;font-size:1.55rem;color:var(--purple-dark);text-align:center;margin-top:4px}
h1 .heart{color:var(--pink)}
.sub{font-size:.78rem;color:#8a7fa0;text-align:center;margin-bottom:12px}
.tabs{display:flex;gap:7px;margin-bottom:16px;flex-wrap:wrap;justify-content:center}
.tab{
  font-family:'Mali',cursive;font-weight:600;font-size:.88rem;
  padding:7px 13px;border-radius:999px;border:2px solid var(--purple);
  background:#fff;color:var(--purple);cursor:pointer;box-shadow:var(--shadow);transition:transform .1s;
}
.tab:active{transform:translateY(2px);box-shadow:none}
.tab.active{background:var(--purple);color:#fff}
.tab.exam{border-color:var(--gold);color:#b8860b}
.tab.exam.active{background:var(--gold);color:var(--ink)}
.stage{width:100%;max-width:430px}

.card-wrap{perspective:1000px;margin-bottom:14px}
.card{position:relative;width:100%;height:250px;cursor:pointer;transform-style:preserve-3d;transition:transform .45s}
.card.flipped{transform:rotateY(180deg)}
.face{
  position:absolute;inset:0;backface-visibility:hidden;background:#fff;
  border:2.5px solid var(--purple);border-radius:20px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;padding:20px;box-shadow:var(--shadow);gap:6px;
}
.face.back{transform:rotateY(180deg);background:var(--pink-soft);border-color:var(--pink)}
.emo{font-size:3rem;line-height:1}
.word{font-family:'Mali',cursive;font-size:1.9rem;font-weight:700;color:var(--purple-dark);text-align:center}
.meaning{font-family:'Mali',cursive;font-size:1.4rem;font-weight:600;text-align:center;line-height:1.4}
.syn{font-size:.8rem;color:#a06a85;text-align:center}
.hint{font-size:.72rem;color:#a89bc0}
.controls{display:flex;gap:10px;justify-content:center}
.btn{
  font-family:'Prompt',sans-serif;font-weight:500;font-size:.9rem;padding:10px 18px;
  border-radius:14px;border:2px solid var(--ink);background:#fff;cursor:pointer;
  box-shadow:var(--shadow);transition:transform .1s;
}
.btn:active{transform:translateY(2px);box-shadow:none}
.btn.primary{background:var(--purple);border-color:var(--purple);color:#fff}
.btn.small{font-size:.8rem;padding:7px 14px}
.counter{text-align:center;font-size:.85rem;color:#8a7fa0;margin-bottom:10px}

.q-box{background:#fff;border:2.5px solid var(--purple);border-radius:20px;padding:20px 16px;box-shadow:var(--shadow);margin-bottom:14px;text-align:center}
.q-label{font-size:.78rem;color:#a89bc0;margin-bottom:6px}
.q-word{font-family:'Mali',cursive;font-size:1.6rem;font-weight:700;color:var(--purple-dark);line-height:1.35}
.song-badge{
  display:inline-block;margin-top:8px;font-size:.75rem;background:var(--pink-soft);
  border:1.5px solid var(--pink);color:#b05a7e;border-radius:999px;padding:3px 12px;font-weight:500;
}
.choices{display:flex;flex-direction:column;gap:10px}
.choice{
  font-family:'Prompt',sans-serif;font-size:.98rem;text-align:left;padding:12px 16px;
  border-radius:14px;border:2px solid var(--ink);background:#fff;cursor:pointer;
  box-shadow:var(--shadow);transition:transform .1s;
}
.choice:active{transform:translateY(2px);box-shadow:none}
.choice.correct{background:var(--green);border-color:var(--green);color:#fff}
.choice.wrong{background:var(--red);border-color:var(--red);color:#fff}
.choice:disabled{cursor:default}
.scorebar{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;font-size:.85rem;color:var(--purple-dark);font-weight:500}
.streak{color:var(--pink);font-weight:600}
.next-row{margin-top:14px;text-align:center;min-height:48px}

.sentence{font-size:1.02rem;line-height:1.7;background:#fff;border:2.5px solid var(--purple);border-radius:20px;padding:18px 16px;box-shadow:var(--shadow);margin-bottom:14px}
.blank{display:inline-block;min-width:90px;border-bottom:2.5px dashed var(--pink);text-align:center;font-family:'Mali',cursive;font-weight:700;color:var(--purple-dark)}
.th-hint{display:block;margin-top:10px;font-size:.85rem;color:#8a7fa0}
.hint-btn{
  display:inline-block;margin-top:10px;font-size:.78rem;font-family:'Prompt',sans-serif;
  border:1.5px dashed var(--pink);background:var(--pink-soft);color:#b05a7e;
  border-radius:999px;padding:4px 14px;cursor:pointer;
}
.done-box{background:var(--pink-soft);border:2.5px solid var(--pink);border-radius:20px;padding:26px 18px;text-align:center;box-shadow:var(--shadow)}
.done-box .big{font-family:'Mali',cursive;font-size:1.55rem;font-weight:700;color:var(--purple-dark);margin-bottom:6px}
.hidden{display:none}

.subtabs{display:flex;gap:8px;justify-content:center;margin-bottom:14px;flex-wrap:wrap}
.subtab{
  font-family:'Mali',cursive;font-weight:600;font-size:.82rem;padding:6px 14px;border-radius:999px;
  border:2px solid var(--gold);background:#fff;color:#b8860b;cursor:pointer;box-shadow:var(--shadow);
}
.subtab.active{background:var(--gold);color:var(--ink)}
.study-card{
  background:#fff;border:2px solid var(--grid);border-left:6px solid var(--gold);
  border-radius:14px;padding:12px 14px;margin-bottom:10px;box-shadow:var(--shadow);
}
.study-card .w{font-family:'Mali',cursive;font-weight:700;font-size:1.15rem;color:var(--purple-dark)}
.study-card .m{font-size:.92rem;margin-top:2px}
.study-card .s{font-size:.75rem;color:#a06a85}
.study-card .ex{font-size:.8rem;color:#6c6284;margin-top:6px;font-style:italic;border-top:1px dashed var(--grid);padding-top:6px}
.exam-banner{
  background:#fff8e1;border:2px solid var(--gold);border-radius:14px;padding:10px 14px;
  font-size:.82rem;margin-bottom:14px;text-align:center;box-shadow:var(--shadow);
}
.jb-card{
  background:#fff;border:2px solid var(--grid);border-left:6px solid var(--pink);
  border-radius:14px;padding:12px 14px;margin-bottom:10px;box-shadow:var(--shadow);
}
.jb-card .w{font-family:'Mali',cursive;font-weight:700;font-size:1.1rem;color:var(--purple-dark)}
.jb-card .m{font-size:.9rem}
.jb-card .s{font-size:.75rem;color:#a06a85}
</style>
</head>
<body>
<h1>N'Eye Vocab <span class="heart">♡</span></h1>
<div class="sub">ฝึกวันละนิด เก่งขึ้นทุกวัน!</div>

<div class="tabs">
  <button class="tab active" data-mode="flash">🃏 การ์ด</button>
  <button class="tab" data-mode="quiz">✏️ ควิซ</button>
  <button class="tab" data-mode="fill">📝 เติมคำ</button>
  <button class="tab" data-mode="bieber">🎤 Bieber</button>
  <button class="tab exam" data-mode="day8">⭐ สอบ Day 8</button>
</div>

<div class="stage">

  <!-- FLASHCARDS -->
  <div id="flash">
    <div class="counter" id="fc-counter"></div>
    <div class="card-wrap">
      <div class="card" id="fc-card">
        <div class="face front">
          <div class="emo" id="fc-emo"></div>
          <div class="word" id="fc-word"></div>
          <div class="hint">แตะเพื่อดูความหมาย</div>
        </div>
        <div class="face back">
          <div class="meaning" id="fc-meaning"></div>
          <div class="syn" id="fc-syn"></div>
          <div class="hint">แตะเพื่อกลับ</div>
        </div>
      </div>
    </div>
    <div class="controls">
      <button class="btn" id="fc-prev">←</button>
      <button class="btn" id="fc-shuffle">🔀 สลับ</button>
      <button class="btn primary" id="fc-next">ถัดไป →</button>
    </div>
  </div>

  <!-- QUIZ -->
  <div id="quiz" class="hidden">
    <div class="scorebar">
      <span>คะแนน: <b id="qz-score">0</b>/<span id="qz-total">0</span></span>
      <span class="streak" id="qz-streak"></span>
    </div>
    <div class="q-box">
      <div class="q-label" id="qz-label"></div>
      <div class="q-word" id="qz-word"></div>
    </div>
    <div class="choices" id="qz-choices"></div>
    <div class="next-row"><button class="btn primary hidden" id="qz-next">ข้อต่อไป →</button></div>
  </div>

  <!-- FILL IN -->
  <div id="fill" class="hidden">
    <div class="scorebar">
      <span>ทำแล้ว: <b id="fi-done">0</b>/<span id="fi-total">0</span></span>
      <span class="streak" id="fi-score"></span>
    </div>
    <div id="fi-play">
      <div class="sentence" id="fi-sentence"></div>
      <div class="choices" id="fi-choices"></div>
      <div class="next-row"><button class="btn primary hidden" id="fi-next">ประโยคต่อไป →</button></div>
    </div>
    <div id="fi-end" class="done-box hidden">
      <div class="big">เก่งมาก! 🎉</div>
      <div id="fi-result"></div><br>
      <button class="btn primary" id="fi-restart">เล่นอีกรอบ</button>
    </div>
  </div>

  <!-- BIEBER -->
  <div id="bieber" class="hidden">
    <div class="exam-banner" style="background:var(--pink-soft);border-color:var(--pink)">
      🎧 ศัพท์จากเพลง Justin Bieber — เจอคำนี้ในเพลงไหน ลองนึกทำนองตามดู!
    </div>
    <div class="subtabs">
      <button class="subtab active" data-jb="quiz" style="border-color:var(--pink);color:#b05a7e">✏️ ควิซ</button>
      <button class="subtab" data-jb="list" style="border-color:var(--pink);color:#b05a7e">📖 ดูศัพท์ทั้งหมด</button>
    </div>
    <div id="jb-quiz">
      <div class="scorebar">
        <span>คะแนน: <b id="jb-score">0</b>/<span id="jb-total">0</span></span>
        <span class="streak" id="jb-streak"></span>
      </div>
      <div class="q-box" style="border-color:var(--pink)">
        <div class="q-label" id="jb-label"></div>
        <div class="q-word" id="jb-word"></div>
        <div><span class="song-badge" id="jb-song"></span></div>
      </div>
      <div class="choices" id="jb-choices"></div>
      <div class="next-row"><button class="btn primary hidden" id="jb-next">ข้อต่อไป →</button></div>
    </div>
    <div id="jb-list" class="hidden"></div>
  </div>

  <!-- DAY 8 EXAM -->
  <div id="day8" class="hidden">
    <div class="exam-banner">⭐ ติวเข้มก่อนสอบ — ศัพท์ Day 8 ทั้ง 10 คำ สู้ๆ นะ! ⭐</div>
    <div class="subtabs">
      <button class="subtab active" data-d8="study">📖 ท่อง</button>
      <button class="subtab" data-d8="quiz">✏️ ควิซ</button>
      <button class="subtab" data-d8="fill">📝 เติมคำ</button>
    </div>

    <div id="d8-study"></div>

    <div id="d8-quiz" class="hidden">
      <div class="scorebar">
        <span>คะแนน: <b id="d8q-score">0</b>/<span id="d8q-total">0</span></span>
        <span class="streak" id="d8q-streak"></span>
      </div>
      <div class="q-box" style="border-color:var(--gold)">
        <div class="q-label" id="d8q-label"></div>
        <div class="q-word" id="d8q-word"></div>
      </div>
      <div class="choices" id="d8q-choices"></div>
      <div class="next-row"><button class="btn primary hidden" id="d8q-next">ข้อต่อไป →</button></div>
    </div>

    <div id="d8-fill" class="hidden">
      <div class="scorebar">
        <span>ทำแล้ว: <b id="d8f-done">0</b>/<span id="d8f-total">0</span></span>
        <span class="streak" id="d8f-score"></span>
      </div>
      <div id="d8f-play">
        <div class="sentence" id="d8f-sentence" style="border-color:var(--gold)"></div>
        <div class="choices" id="d8f-choices"></div>
        <div class="next-row"><button class="btn primary hidden" id="d8f-next">ประโยคต่อไป →</button></div>
      </div>
      <div id="d8f-end" class="done-box hidden" style="background:#fff8e1;border-color:var(--gold)">
        <div class="big">พร้อมสอบแล้ว! 💪</div>
        <div id="d8f-result"></div><br>
        <button class="btn primary" id="d8f-restart">เล่นอีกรอบ</button>
      </div>
    </div>
  </div>

</div>

// ================= GENERIC QUIZ FACTORY =================
// data: array where [0]=word, [1]=meaning ; extra = optional fn(item)=>badge text
function makeQuiz(data, ids, opts={}){
  let score=0,total=0,streak=0;
  function newQ(){
    $(ids.next).classList.add('hidden');
    const reverse = Math.random() < (opts.reverseRate ?? 0.4);
    const pool = shuffle([...data]);
    const cur = pool[0];
    const wrongs = pool.slice(1,4);
    const choices = shuffle([cur,...wrongs]);
    $(ids.label).textContent = reverse ? 'คำนี้ภาษาอังกฤษว่าอะไร?' : 'คำนี้แปลว่าอะไร?';
    $(ids.word).textContent = reverse ? cur[1] : cur[0];
    if(ids.badge && opts.badge) $(ids.badge).textContent = '🎵 ' + opts.badge(cur);
    const box = $(ids.choices); box.innerHTML='';
    choices.forEach(c=>{
      const b=document.createElement('button');
      b.className='choice';
      b.textContent = reverse ? c[0] : c[1];
      b.onclick=()=>{
        total++;
        box.querySelectorAll('.choice').forEach(x=>x.disabled=true);
        if(c===cur){ b.classList.add('correct'); score++; streak++; }
        else{
          b.classList.add('wrong'); streak=0;
          [...box.children].find(x=>x.textContent===(reverse?cur[0]:cur[1])).classList.add('correct');
        }
        $(ids.score).textContent=score; $(ids.total).textContent=total;
        $(ids.streak).textContent = streak>=2 ? `🔥 ถูกติดกัน ${streak} ข้อ!` : '';
        $(ids.next).classList.remove('hidden');
      };
      box.appendChild(b);
    });
  }
  $(ids.next).onclick=newQ;
  newQ();
}

// ================= GENERIC FILL FACTORY (คำใบ้ซ่อน กดค่อยโชว์) =================
function makeFill(sentences, wordPool, ids){
  let order=[],idx=0,score=0;
  function start(){
    order=shuffle([...sentences]); idx=0; score=0;
    $(ids.total).textContent=order.length;
    $(ids.end).classList.add('hidden'); $(ids.play).classList.remove('hidden');
    render();
  }
  function render(){
    $(ids.done).textContent=idx;
    $(ids.scoreTxt).textContent=`ถูก ${score} ข้อ`;
    $(ids.next).classList.add('hidden');
    const [en,ans,th]=order[idx];
    const sEl = $(ids.sentence);
    sEl.innerHTML = en.replace('___','<span class="blank">______</span>');
    // hidden hint + button
    const hb=document.createElement('span');
    hb.className='hint-btn'; hb.textContent='💡 ขอคำใบ้';
    hb.onclick=()=>{ hb.outerHTML = `<span class="th-hint">💡 ${th}</span>`; };
    sEl.appendChild(document.createElement('br'));
    sEl.appendChild(hb);
    const wrongs = shuffle(wordPool.filter(v=>v[0]!==ans)).slice(0,3).map(v=>v[0]);
    const choices = shuffle([ans,...wrongs]);
    const box=$(ids.choices); box.innerHTML='';
    choices.forEach(c=>{
      const b=document.createElement('button');
      b.className='choice'; b.textContent=c;
      b.onclick=()=>{
        box.querySelectorAll('.choice').forEach(x=>x.disabled=true);
        if(c===ans){ b.classList.add('correct'); score++;
          $(ids.sentence).innerHTML = en.replace('___',`<span class="blank">${ans}</span>`) + `<span class="th-hint">💡 ${th}</span>`;
        } else {
          b.classList.add('wrong');
          [...box.children].find(x=>x.textContent===ans).classList.add('correct');
        }
        $(ids.scoreTxt).textContent=`ถูก ${score} ข้อ`;
        $(ids.next).classList.remove('hidden');
      };
      box.appendChild(b);
    });
  }
  $(ids.next).onclick=()=>{
    idx++;
    if(idx>=order.length){
      $(ids.play).classList.add('hidden');
      $(ids.end).classList.remove('hidden');
      $(ids.done).textContent=order.length;
      $(ids.result).textContent=`ตอบถูก ${score} จาก ${order.length} ประโยค`;
    } else render();
  };
  $(ids.restart).onclick=start;
  start();
}
