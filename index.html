<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>N'Eye Vocab ✦</title>
<link href="https://fonts.googleapis.com/css2?family=Mali:wght@500;600;700&family=Prompt:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#FBF8EE; --grid:#E4DECB; --ink:#2E2440;
  --purple:#7B5EA7; --purple-dark:#5A4380;
  --pink:#F2A7C3; --pink-soft:#FBE3ED;
  --green:#7FBF8E; --red:#E58787; --gold:#F5C84C;
  --shadow:0 4px 0 rgba(46,36,64,.15);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{
  font-family:'Prompt',sans-serif;background:var(--paper);
  background-image:linear-gradient(var(--grid) 1px,transparent 1px),linear-gradient(90deg,var(--grid) 1px,transparent 1px);
  background-size:22px 22px;color:var(--ink);min-height:100vh;
  display:flex;flex-direction:column;align-items:center;padding:16px 14px 40px;
}
h1{font-family:'Mali',cursive;font-size:1.55rem;color:var(--purple-dark);text-align:center;margin-top:4px}
h1 .heart{color:var(--pink)}
.sub{font-size:.78rem;color:#8a7fa0;text-align:center;margin-bottom:12px}
.tabs{display:flex;gap:7px;margin-bottom:16px;flex-wrap:wrap;justify-content:center}
.tab{
  font-family:'Mali',cursive;font-weight:600;font-size:.88rem;
  padding:7px 13px;border-radius:999px;border:2px solid var(--purple);
  background:#fff;color:var(--purple);cursor:pointer;box-shadow:var(--shadow);transition:transform .1s;
}
.tab:active{transform:translateY(2px);box-shadow:none}
.tab.active{background:var(--purple);color:#fff}
.tab.exam{border-color:var(--gold);color:#b8860b}
.tab.exam.active{background:var(--gold);color:var(--ink)}
.stage{width:100%;max-width:430px}

.card-wrap{perspective:1000px;margin-bottom:14px}
.card{position:relative;width:100%;height:240px;cursor:pointer;transform-style:preserve-3d;transition:transform .45s}
.card.flipped{transform:rotateY(180deg)}
.face{
  position:absolute;inset:0;backface-visibility:hidden;background:#fff;
  border:2.5px solid var(--purple);border-radius:20px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;padding:20px;box-shadow:var(--shadow);gap:8px;
}
.face.back{transform:rotateY(180deg);background:var(--pink-soft);border-color:var(--pink)}
.word{font-family:'Mali',cursive;font-size:2rem;font-weight:700;color:var(--purple-dark);text-align:center}
.meaning{font-family:'Mali',cursive;font-size:1.4rem;font-weight:600;text-align:center;line-height:1.4}
.syn{font-size:.8rem;color:#a06a85;text-align:center}
.hint{font-size:.72rem;color:#a89bc0}
.controls{display:flex;gap:10px;justify-content:center}
.btn{
  font-family:'Prompt',sans-serif;font-weight:500;font-size:.9rem;padding:10px 18px;
  border-radius:14px;border:2px solid var(--ink);background:#fff;cursor:pointer;
  box-shadow:var(--shadow);transition:transform .1s;
}
.btn:active{transform:translateY(2px);box-shadow:none}
.btn.primary{background:var(--purple);border-color:var(--purple);color:#fff}
.btn.small{font-size:.8rem;padding:6px 13px}
.counter{text-align:center;font-size:.85rem;color:#8a7fa0;margin-bottom:10px}
.fc-icon{
  position:absolute;top:12px;border:none;background:transparent;font-size:1.35rem;
  cursor:pointer;line-height:1;padding:4px;border-radius:10px;z-index:2;
}
.fc-icon:active{transform:scale(.88)}
.fc-icon.speak{right:12px}
.fc-icon.mark{left:12px;filter:grayscale(1);opacity:.4}
.fc-icon.mark.on{filter:none;opacity:1}
.fc-review-row{text-align:center;margin:-2px 0 12px}
#fc-review.active{background:var(--pink);border-color:var(--pink);color:#fff}

.q-box{background:#fff;border:2.5px solid var(--purple);border-radius:20px;padding:20px 16px;box-shadow:var(--shadow);margin-bottom:14px;text-align:center}
.q-label{font-size:.78rem;color:#a89bc0;margin-bottom:6px}
.q-word{font-family:'Mali',cursive;font-size:1.6rem;font-weight:700;color:var(--purple-dark);line-height:1.35}
.song-badge{
  display:inline-block;margin-top:8px;font-size:.75rem;background:var(--pink-soft);
  border:1.5px solid var(--pink);color:#b05a7e;border-radius:999px;padding:3px 12px;font-weight:500;
}
.level-badge{
  display:inline-block;font-size:.72rem;border-radius:999px;padding:2px 10px;
  font-weight:600;margin-left:6px;vertical-align:middle;
}
.lv1{background:#e8f5e9;color:#2e7d32;border:1.5px solid #a5d6a7}
.lv2{background:#e3f2fd;color:#1565c0;border:1.5px solid #90caf9}
.lv3{background:#fff3e0;color:#e65100;border:1.5px solid #ffcc80}
.lv4{background:#fce4ec;color:#ad1457;border:1.5px solid #f48fb1}
.choices{display:flex;flex-direction:column;gap:10px}
.choice{
  font-family:'Prompt',sans-serif;font-size:.98rem;text-align:left;padding:12px 16px;
  border-radius:14px;border:2px solid var(--ink);background:#fff;cursor:pointer;
  box-shadow:var(--shadow);transition:transform .1s;
}
.choice:active{transform:translateY(2px);box-shadow:none}
.choice.correct{background:var(--green);border-color:var(--green);color:#fff}
.choice.wrong{background:var(--red);border-color:var(--red);color:#fff}
.choice:disabled{cursor:default}
.scorebar{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;font-size:.85rem;color:var(--purple-dark);font-weight:500}
.streak{color:var(--pink);font-weight:600}
.next-row{margin-top:14px;text-align:center;min-height:48px}

.sentence{font-size:1.05rem;line-height:1.9;background:#fff;border:2.5px solid var(--purple);border-radius:20px;padding:18px 16px;box-shadow:var(--shadow);margin-bottom:6px}
.blank{display:inline-block;min-width:90px;border-bottom:2.5px dashed var(--pink);text-align:center;font-family:'Mali',cursive;font-weight:700;color:var(--purple-dark)}
.tapw{cursor:pointer;border-radius:6px;padding:0 2px}
.tapw.lit{background:var(--gold)}
.wordtip{
  min-height:26px;font-size:.85rem;color:var(--purple-dark);background:#fff8e1;
  border:1.5px dashed var(--gold);border-radius:10px;padding:5px 12px;margin-bottom:10px;
}
.wordtip.empty{visibility:hidden}
.tap-note{font-size:.7rem;color:#a89bc0;text-align:center;margin-bottom:8px}
.th-hint{display:block;margin-top:10px;font-size:.85rem;color:#8a7fa0}
.hint-btn{
  display:inline-block;margin-top:10px;font-size:.78rem;font-family:'Prompt',sans-serif;
  border:1.5px dashed var(--pink);background:var(--pink-soft);color:#b05a7e;
  border-radius:999px;padding:4px 14px;cursor:pointer;
}
.type-row{display:flex;gap:8px;margin-bottom:4px}
.type-input{
  flex:1;font-family:'Prompt',sans-serif;font-size:1rem;padding:11px 14px;
  border:2px solid var(--ink);border-radius:14px;background:#fff;box-shadow:var(--shadow);
  outline:none;
}
.type-input.ok{background:var(--green);border-color:var(--green);color:#fff}
.type-input.bad{background:var(--red);border-color:var(--red);color:#fff}
.mode-row{text-align:center;margin-bottom:12px}
.done-box{background:var(--pink-soft);border:2.5px solid var(--pink);border-radius:20px;padding:26px 18px;text-align:center;box-shadow:var(--shadow)}
.done-box .big{font-family:'Mali',cursive;font-size:1.55rem;font-weight:700;color:var(--purple-dark);margin-bottom:6px}
.hidden{display:none}

.subtabs{display:flex;gap:8px;justify-content:center;margin-bottom:14px;flex-wrap:wrap}
.subtab{
  font-family:'Mali',cursive;font-weight:600;font-size:.82rem;padding:6px 14px;border-radius:999px;
  border:2px solid var(--gold);background:#fff;color:#b8860b;cursor:pointer;box-shadow:var(--shadow);
}
.subtab.active{background:var(--gold);color:var(--ink)}
.subtab.pinkish{border-color:var(--pink);color:#b05a7e}
.subtab.pinkish.active{background:var(--pink);color:#fff}
.day-select{display:flex;gap:8px;justify-content:center;margin-bottom:12px}
.day-btn{
  font-family:'Mali',cursive;font-weight:700;font-size:.9rem;padding:8px 16px;border-radius:14px;
  border:2px solid var(--purple);background:#fff;color:var(--purple);cursor:pointer;box-shadow:var(--shadow);
}
.day-btn.active{background:var(--purple);color:#fff}
.section-head{
  font-family:'Mali',cursive;font-weight:700;font-size:1rem;color:var(--purple-dark);
  margin:14px 0 8px;text-align:center;
}
.study-card{
  background:#fff;border:2px solid var(--grid);border-left:6px solid var(--gold);
  border-radius:14px;padding:12px 14px;margin-bottom:10px;box-shadow:var(--shadow);
}
.study-card.extra{border-left-color:var(--purple)}
.study-card .w{font-family:'Mali',cursive;font-weight:700;font-size:1.15rem;color:var(--purple-dark)}
.study-card .m{font-size:.92rem;margin-top:2px}
.study-card .s{font-size:.75rem;color:#a06a85}
.study-card .ex{font-size:.8rem;color:#6c6284;margin-top:6px;font-style:italic;border-top:1px dashed var(--grid);padding-top:6px}
.exam-banner{
  background:#fff8e1;border:2px solid var(--gold);border-radius:14px;padding:10px 14px;
  font-size:.82rem;margin-bottom:14px;text-align:center;box-shadow:var(--shadow);
}
.jb-card{
  background:#fff;border:2px solid var(--grid);border-left:6px solid var(--pink);
  border-radius:14px;padding:12px 14px;margin-bottom:10px;box-shadow:var(--shadow);
}
.jb-card .w{font-family:'Mali',cursive;font-weight:700;font-size:1.1rem;color:var(--purple-dark)}
.jb-card .m{font-size:.9rem}
.jb-card .s{font-size:.75rem;color:#a06a85}

.match-note{font-size:.75rem;color:#a89bc0;text-align:center;margin-bottom:12px}
.match-grid{display:flex;gap:10px}
.match-col{flex:1;display:flex;flex-direction:column;gap:10px}
.match-item{
  font-family:'Prompt',sans-serif;font-size:.9rem;text-align:center;padding:12px 8px;
  border-radius:14px;border:2px solid var(--purple);background:#fff;color:var(--ink);
  cursor:pointer;box-shadow:var(--shadow);transition:transform .1s;min-height:54px;
  display:flex;align-items:center;justify-content:center;line-height:1.3;
}
.match-item:active{transform:translateY(2px);box-shadow:none}
.match-col:last-child .match-item{border-color:var(--pink);color:#8a5a70;font-size:.82rem}
.match-item.sel{background:var(--gold);border-color:var(--gold);color:var(--ink)}
.match-item.done{background:var(--green);border-color:var(--green);color:#fff;cursor:default;opacity:.6}
.match-item.miss{background:var(--red);border-color:var(--red);color:#fff}
</style>
</head>
<body>
<h1>N'Eye Vocab <span class="heart">♡</span></h1>
<div class="sub">ฝึกวันละนิด เก่งขึ้นทุกวัน!</div>

<div class="tabs">
  <button class="tab active" data-mode="flash">🃏 การ์ด</button>
  <button class="tab" data-mode="quiz">✏️ ควิซ</button>
  <button class="tab" data-mode="fill">📝 เติมคำ</button>
  <button class="tab" data-mode="match">🔗 จับคู่</button>
  <button class="tab" data-mode="bieber">🎤 Bieber</button>
  <button class="tab exam" data-mode="exam">⭐ ติวสอบ</button>
</div>

<div class="stage">

  <!-- FLASHCARDS -->
  <div id="flash">
    <div class="counter" id="fc-counter"></div>
    <div class="card-wrap">
      <div class="card" id="fc-card">
        <div class="face front">
          <button class="fc-icon mark" id="fc-mark" title="ยังจำไม่ได้ — กดเก็บไว้ทบทวน">🔖</button>
          <button class="fc-icon speak" id="fc-speak" title="ฟังเสียงอ่าน">🔊</button>
          <div class="word" id="fc-word"></div>
          <div class="hint">แตะเพื่อดูความหมาย</div>
        </div>
        <div class="face back">
          <button class="fc-icon speak" id="fc-speak2" title="ฟังเสียงอ่าน">🔊</button>
          <div class="meaning" id="fc-meaning"></div>
          <div class="syn" id="fc-syn"></div>
          <div class="hint">แตะเพื่อกลับ</div>
        </div>
      </div>
    </div>
    <div class="fc-review-row">
      <button class="btn small" id="fc-review">🔖 ทบทวนคำที่ยังจำไม่ได้ (<span id="fc-markcount">0</span>)</button>
    </div>
    <div class="controls">
      <button class="btn" id="fc-prev">←</button>
      <button class="btn" id="fc-shuffle">🔀 สลับ</button>
      <button class="btn primary" id="fc-next">ถัดไป →</button>
    </div>
  </div>

  <!-- QUIZ -->
  <div id="quiz" class="hidden">
    <div class="scorebar">
      <span>คะแนน: <b id="qz-score">0</b>/<span id="qz-total">0</span></span>
      <span class="streak" id="qz-streak"></span>
    </div>
    <div class="q-box">
      <div class="q-label" id="qz-label"></div>
      <div class="q-word" id="qz-word"></div>
    </div>
    <div class="choices" id="qz-choices"></div>
    <div class="next-row"><button class="btn primary hidden" id="qz-next">ข้อต่อไป →</button></div>
  </div>

  <!-- FILL IN (main) -->
  <div id="fill" class="hidden"></div>

  <!-- ==== จับคู่ synonym ==== -->
  <div id="match" class="hidden">
    <div class="scorebar">
      <span>จับคู่ถูก: <b id="mt-score">0</b> คู่</span>
      <span class="streak" id="mt-round"></span>
    </div>
    <div class="match-note">👆 แตะคำอังกฤษ แล้วแตะความหมาย/คำเหมือนที่คู่กัน</div>
    <div class="match-grid">
      <div class="match-col" id="mt-left"></div>
      <div class="match-col" id="mt-right"></div>
    </div>
    <div class="next-row"><button class="btn primary hidden" id="mt-next">ชุดต่อไป →</button></div>
  </div>

  <!-- BIEBER -->
  <div id="bieber" class="hidden">
    <div class="exam-banner" style="background:var(--pink-soft);border-color:var(--pink)">
      🎧 ศัพท์จากเพลง Justin Bieber — ตอบก่อน ถ้านึกไม่ออกค่อยกดขอคำใบ้ชื่อเพลง!
    </div>
    <div class="subtabs">
      <button class="subtab pinkish active" data-jb="quiz">✏️ ควิซ</button>
      <button class="subtab pinkish" data-jb="list">📖 ดูศัพท์ทั้งหมด</button>
    </div>
    <div id="jb-quiz">
      <div class="scorebar">
        <span>คะแนน: <b id="jb-score">0</b>/<span id="jb-total">0</span></span>
        <span class="streak" id="jb-streak"></span>
      </div>
      <div class="q-box" style="border-color:var(--pink)">
        <div class="q-label" id="jb-label"></div>
        <div class="q-word" id="jb-word"></div>
        <div id="jb-hintarea"></div>
      </div>
      <div class="choices" id="jb-choices"></div>
      <div class="next-row"><button class="btn primary hidden" id="jb-next">ข้อต่อไป →</button></div>
    </div>
    <div id="jb-list" class="hidden"></div>
  </div>

  <!-- EXAM HUB -->
  <div id="exam" class="hidden">
    <div class="exam-banner">⭐ ติวเข้มก่อนสอบ — เลือกบทที่จะสอบได้เลย สู้ๆ นะ! ⭐</div>
    <div class="day-select" id="day-select"></div>
    <div id="exam-days"></div>
  </div>

</div>

<script>
// ============================================================
// DATA — [English, ความหมายไทย, synonym]
// ============================================================
const VOCAB = [

const saveMarked = ()=> localStorage.setItem('neye_marked', JSON.stringify([...marked]));
function speak(w){
  try{
    if(!('speechSynthesis' in window)) return;
    speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(w);
    u.lang='en-US'; u.rate=.9;
    speechSynthesis.speak(u);
  }catch(e){}
}
function updateMarkUI(){
  const mc=$('fc-markcount'); if(mc) mc.textContent=marked.size;
  const cur=deck[fcIdx];
  $('fc-mark').classList.toggle('on', !!(cur && marked.has(cur[0])));
}
function renderCard(){
  if(!deck.length) return;
  $('fc-card').classList.remove('flipped');
  setTimeout(()=>{
    const [en,th,syn] = deck[fcIdx];
    $('fc-word').textContent = en;
    $('fc-meaning').textContent = th;
    $('fc-syn').textContent = '≈ ' + syn;
    $('fc-counter').textContent = (reviewMode?'🔖 ทบทวน — ':'') + `การ์ดที่ ${fcIdx+1} / ${deck.length}`;
    updateMarkUI();
  },150);
}
$('fc-card').onclick = ()=> $('fc-card').classList.toggle('flipped');
$('fc-next').onclick = ()=>{ fcIdx=(fcIdx+1)%deck.length; renderCard(); };
$('fc-prev').onclick = ()=>{ fcIdx=(fcIdx-1+deck.length)%deck.length; renderCard(); };
$('fc-shuffle').onclick = ()=>{ deck=shuffle(deck); fcIdx=0; renderCard(); };
$('fc-speak').onclick = e=>{ e.stopPropagation(); speak($('fc-word').textContent); };
$('fc-speak2').onclick = e=>{ e.stopPropagation(); speak($('fc-word').textContent); };
$('fc-mark').onclick = e=>{
  e.stopPropagation();
  const cur=deck[fcIdx]; if(!cur) return;
  if(marked.has(cur[0])) marked.delete(cur[0]); else marked.add(cur[0]);
  saveMarked(); updateMarkUI();
};
$('fc-review').onclick = ()=>{
  if(!reviewMode){
    if(marked.size===0){ $('fc-counter').textContent='ยังไม่มีคำที่มาร์คไว้ — กด 🔖 บนการ์ดเพื่อเก็บคำที่ยังจำไม่ได้'; return; }

    $('fc-review').classList.add('active');
    $('fc-review').innerHTML='↩️ ดูการ์ดทั้งหมด';

    reviewMode=false; deck=fullDeck; fcIdx=0;

    $('fc-review').innerHTML='🔖 ทบทวนคำที่ยังจำไม่ได้ (<span id="fc-markcount">'+marked.size+'</span>)';
  }

};

function makeQuiz(data, ids, opts={}){
  let score=0,total=0,streak=0;
  function newQ(){
    $(ids.next).classList.add('hidden');
    const reverse = Math.random() < (opts.reverseRate ?? 0.4);
    const pool = shuffle([...data]);
    const cur = pool[0];
    const wrongs = pool.slice(1,4);
    const choices = shuffle([cur,...wrongs]);
    $(ids.label).textContent = reverse ? 'คำนี้ภาษาอังกฤษว่าอะไร?' : 'คำนี้แปลว่าอะไร?';
    $(ids.word).textContent = reverse ? cur[1] : cur[0];
    if(ids.hintarea && opts.hint){
      const area = $(ids.hintarea); area.innerHTML='';
      const hb=document.createElement('span');
      hb.className='hint-btn'; hb.textContent='💡 ขอคำใบ้ชื่อเพลง';
      hb.onclick=()=>{ hb.outerHTML = `<span class="song-badge">🎵 ${opts.hint(cur)}</span>`; };
      area.appendChild(hb);
    }
    const box = $(ids.choices); box.innerHTML='';
    choices.forEach(c=>{
      const b=document.createElement('button');
      b.className='choice';
      b.textContent = reverse ? c[0] : c[1];
      b.onclick=()=>{
        total++;
        box.querySelectorAll('.choice').forEach(x=>x.disabled=true);
        if(c===cur){ b.classList.add('correct'); score++; streak++; }
        else{
          b.classList.add('wrong'); streak=0;
          [...box.children].find(x=>x.textContent===(reverse?cur[0]:cur[1])).classList.add('correct');
        }
        $(ids.score).textContent=score; $(ids.total).textContent=total;
        $(ids.streak).textContent = streak>=2 ? `🔥 ถูกติดกัน ${streak} ข้อ!` : '';
        if(ids.hintarea && opts.hint) $(ids.hintarea).innerHTML = `<span class="song-badge">🎵 ${opts.hint(cur)}</span>`;
        $(ids.next).classList.remove('hidden');
      };
      box.appendChild(b);
    });
  }
  $(ids.next).onclick=newQ;
  newQ();
}

function renderTappable(el, text, tipEl){
  el.innerHTML='';
  text.split(' ').forEach((tok,i)=>{
    if(i>0) el.appendChild(document.createTextNode(' '));
    if(tok.includes('___')){
      const bl=document.createElement('span');
      bl.className='blank'; bl.textContent='______';
      el.appendChild(bl);
      const rest=tok.replace('___','');
      if(rest) el.appendChild(document.createTextNode(rest));
      return;
    }
    const sp=document.createElement('span');
    sp.className='tapw'; sp.textContent=tok;
    sp.onclick=()=>{
      el.querySelectorAll('.tapw').forEach(x=>x.classList.remove('lit'));
      sp.classList.add('lit');
      const clean=tok.toLowerCase().replace(/[.,!?;:'"—()]/g,'').replace(/'s$/,'');
      const tr = DICT[tok.toLowerCase().replace(/[.,!?;:"—()]/g,'')] || DICT[clean];
      tipEl.classList.remove('empty');
      tipEl.textContent = tr ? `🔎 ${tok.replace(/[.,!?;:]/g,'')} = ${tr}` : `🔎 ${tok} — ยังไม่มีคำแปลในระบบ`;
    };
    el.appendChild(sp);
  });
}

  let order=[],idx=0,score=0,typing=false;
  const id = s => prefix+'-'+s;
  function start(){
    order = opts.ordered ? [...sentences] : shuffle([...sentences]);
    idx=0; score=0;
    $(id('total')).textContent=order.length;
    $(id('end')).classList.add('hidden'); $(id('play')).classList.remove('hidden');
    render();
  }
  function reveal(correct, ans, th){
    const s=$(id('sentence'));
    renderTappable(s, order[idx][0].replace('___', ans), $(id('tip')));
    const hint=document.createElement('span');
    hint.className='th-hint'; hint.textContent='💡 '+th;
    s.appendChild(hint);
    $(id('score')).textContent=`ถูก ${score} ข้อ`;
    $(id('next')).classList.remove('hidden');
  }
  function render(){
    $(id('done')).textContent=idx+1;
    $(id('score')).textContent=`ถูก ${score} ข้อ`;
    if(opts.levelFn) $(id('level')).innerHTML = opts.levelFn(order[idx]);
    $(id('next')).classList.add('hidden');
    $(id('tip')).classList.add('empty');
    const [en,ans,th,fixed]=order[idx];
    renderTappable($(id('sentence')), en, $(id('tip')));
    // hint button
    const hb=document.createElement('span');
    hb.className='hint-btn'; hb.textContent='💡 ขอคำใบ้';
    hb.onclick=()=>{ hb.outerHTML=`<span class="th-hint">💡 ${th}</span>`; };
    $(id('sentence')).appendChild(document.createElement('br'));
    $(id('sentence')).appendChild(hb);
    // choices vs typing
    const box=$(id('choices'));
    if(typing){
      box.innerHTML='';
      const inp=$(id('input'));
      inp.className='type-input'; inp.value=''; inp.disabled=false;
      $(id('checkbtn')).disabled=false;
      const check=()=>{
        if(inp.disabled) return;
        const guess=inp.value.trim().toLowerCase();
        const target=ans.toLowerCase().replace(/\s*\(v\.\)/,'');
        inp.disabled=true; $(id('checkbtn')).disabled=true;
        if(guess===target){ inp.classList.add('ok'); score++; }
        else{ inp.classList.add('bad'); inp.value=inp.value+' → '+ans; }
        reveal(guess===target, ans, th);
      };
      $(id('checkbtn')).onclick=check;
      inp.onkeydown=e=>{ if(e.key==='Enter') check(); };
      setTimeout(()=>inp.focus(),100);
    } else {
      let choices;
      if(fixed) choices=shuffle([...fixed]);
      else{
        const pool=(opts.pool||[]).filter(v=>v[0]!==ans);
        choices=shuffle([ans,...shuffle(pool).slice(0,3).map(v=>v[0])]);
      }
      box.innerHTML='';
      choices.forEach(c=>{
        const b=document.createElement('button');
        b.className='choice'; b.textContent=c;
        b.onclick=()=>{
          box.querySelectorAll('.choice').forEach(x=>x.disabled=true);
          if(c===ans){ b.classList.add('correct'); score++; }
          else{
            b.classList.add('wrong');
            [...box.children].find(x=>x.textContent===ans).classList.add('correct');
          }
          reveal(c===ans, ans, th);
        };
        box.appendChild(b);
      });
    }
  }
  $(id('modebtn')).onclick=()=>{
    typing=!typing;
    $(id('modebtn')).textContent = typing ? '🔘 สลับเป็นโหมดตัวเลือก' : '⌨️ สลับเป็นโหมดพิมพ์เอง';
    $(id('typerow')).classList.toggle('hidden', !typing);
    $(id('choices')).classList.toggle('hidden', typing);
    render();
  };
  $(id('next')).onclick=()=>{
    idx++;
    if(idx>=order.length){
      $(id('play')).classList.add('hidden');
      $(id('end')).classList.remove('hidden');
      $(id('done')).textContent=order.length;
      $(id('result')).textContent=`ตอบถูก ${score} จาก ${order.length} ประโยค`;
    } else render();
  };
  $(id('restart')).onclick=start;
  start();
}

// จับคู่ synonym — แตะคำอังกฤษ → แตะคำเหมือนที่คู่กัน
// ============================================================
function makeMatch(data){
  let score=0, round=0;
  const left=$('mt-left'), right=$('mt-right');
  function newRound(){
    round++;
    $('mt-next').classList.add('hidden');
    const pick=shuffle([...data]).slice(0,5);
    const total=pick.length;
    let selEl=null, matched=0;
    left.innerHTML=''; right.innerHTML='';
    shuffle(pick).forEach(item=>{
      const b=document.createElement('div');
      b.className='match-item'; b.textContent=item[0]; b.dataset.key=item[0];
      b.onclick=()=>{
        if(b.classList.contains('done')) return;
        left.querySelectorAll('.match-item').forEach(x=>x.classList.remove('sel'));
        b.classList.add('sel'); selEl=b;
      };
      left.appendChild(b);
    });
    shuffle(pick).forEach(item=>{
      const b=document.createElement('div');
      b.className='match-item'; b.textContent='≈ '+item[2]; b.dataset.key=item[0];
      b.onclick=()=>{
        if(b.classList.contains('done')||!selEl) return;
        if(selEl.dataset.key===b.dataset.key){
          selEl.classList.remove('sel'); selEl.classList.add('done');
          b.classList.add('done'); selEl=null; matched++; score++;
          $('mt-score').textContent=score;
          if(matched===total){
            $('mt-round').textContent='✨ ครบ 5 คู่แล้ว! เก่งมาก';
            $('mt-next').classList.remove('hidden');
          }
        } else {
          const bad=selEl; b.classList.add('miss'); bad.classList.add('miss');
          setTimeout(()=>{ b.classList.remove('miss'); bad.classList.remove('miss','sel'); },500);
          selEl=null;
        }
      };
      right.appendChild(b);
    });
    $('mt-round').textContent='ชุดที่ '+round;
  }
  $('mt-next').onclick=newRound;
  newRound();
}
